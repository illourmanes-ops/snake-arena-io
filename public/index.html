<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake Arena.IO</title>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@7.3.2/dist/pixi.min.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="https://cdn.adinplay.com/ads.js"></script>
<style>
  body { margin:0; overflow:hidden; background:#161616; font-family:Arial; touch-action:none; }
  #menu { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.85); padding:40px; border-radius:15px; text-align:center; }
  input,select { padding:12px; border-radius:8px; border:2px solid #555; margin:10px; background:#222; color:#fff; font-size:16px; width:200px; }
  button { padding:15px 50px; background:#00ff88; border:none; border-radius:8px; font-weight:bold; cursor:pointer; font-size:18px; color:#000; }
  #hud { position:absolute; top:15px; left:15px; color:#fff; font-size:20px; font-weight:bold; display:none; text-shadow:2px 2px #000; }
  #minimap { position:absolute; bottom:15px; right:15px; width:140px; height:140px; background:rgba(0,0,0,0.4); border:2px solid #333; border-radius:50%; display:none; }
  #dead { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.9); padding:40px; border-radius:15px; text-align:center; display:none; }
  #leaderboard { position:absolute; top:15px; right:15px; background:rgba(0,0,0,0.4); padding:10px 15px; border-radius:8px; color:#fff; display:none; min-width:160px; }
  #boost { position:absolute; bottom:25px; left:25px; width:80px; height:80px; border-radius:50%; background:rgba(255,255,255,0.1); border:2px solid #fff; display:none; }
  #length { position:absolute; bottom:15px; left:15px; color:#fff; font-size:16px; display:none; text-shadow:2px 2px #000; }
</style>
</head>
<body>
<div id="menu">
  <h1 style="color:#00ff88; font-size:36px; margin-bottom:20px;">snake-arena.io</h1>
  <input id="name" placeholder="Nickname" value="Player" maxlength="15">
  <br><select id="skin">
    <option value="green">Green</option>
    <option value="gold">Gold - Watch Ad</option>
    <option value="rainbow">Rainbow - Watch Ad</option>
    <option value="fire">Fire - Watch Ad</option>
    <option value="ice">Ice - Watch Ad</option>
  </select>
  <br><button onclick="start()">Play</button>
</div>
<div id="hud">Score: <span id="score">0</span></div>
<canvas id="minimap"></canvas>
<div id="leaderboard"><b style="color:#aaa;">Gagnants</b><div id="leaders" style="margin-top:8px;"></div></div>
<div id="length">Votre longueur: <span id="len">15</span><br>Ton rang: <span id="rank">1</span></div>
<div id="dead">
  <h2 style="color:#fff; font-size:28px;">Game Over</h2>
  <p style="color:#fff; font-size:18px; margin:20px 0;">Score: <span id="finalScore">0</span></p>
  <button onclick="reviveAd()" style="background:#FFD700; margin-bottom:10px;">Continue 📺</button>
  <br><button onclick="interstitialAd()">Play Again</button>
</div>
<div id="boost"></div>

<script>
const app = new PIXI.Application({ resizeTo: window, antialias: true, backgroundColor: 0x161616 });
document.body.prepend(app.view);
const socket = io();
let playerId = null, game = {players:{}, orbs:[]}, mouseAngle = 0, boosting = false;
const world = new PIXI.Container();
app.stage.addChild(world);

const SKINS = {
  green: ['0x00ff00','0x00dd00'],
  gold: ['0xFFD700','0xFFA500'],
  rainbow: ['0xFF00FF','0x00FFFF'],
  fire: ['0xFF4444','0xFF8800'],
  ice: ['0x00FFFF','0x0088FF']
};

// FOND HEXAGONES STYLE SLITHER
const hexBg = new PIXI.Graphics();
const hexSize = 25;
for(let x = -100; x < 5100; x += hexSize * 1.5) {
  for(let y = -100; y < 5100; y += hexSize * Math.sqrt(3)) {
    const offsetX = (Math.floor(y / (hexSize * Math.sqrt(3))) % 2) * hexSize * 0.75;
    drawHex(hexBg, x + offsetX, y, hexSize);
  }
}
function drawHex(g, x, y, size) {
  g.lineStyle(1, 0x2a2a2a, 1);
  g.beginFill(0x1e1e1e);
  g.moveTo(x + size, y);
  for(let i = 1; i <= 6; i++) {
    g.lineTo(x + size * Math.cos(i * Math.PI / 3), y + size * Math.sin(i * Math.PI / 3));
  }
  g.endFill();
}
world.addChild(hexBg);

let deathCount = 0;
window.ain = window.ain || { queue: [] };
ain.queue.push(() => ain.configAds({ siteId: 'YOUR_SITE_ID' }));

function start() {
  const skin = document.getElementById('skin').value;
  if (skin!== 'green') {
    adinplay.displayRewardedAd(() => joinGame(skin), () => joinGame('green'));
  } else {
    joinGame('green');
  }
}

function joinGame(skin) {
  socket.emit('join', { name: document.getElementById('name').value, skin });
  document.getElementById('menu').style.display = 'none';
  document.getElementById('hud').style.display = 'block';
  document.getElementById('minimap').style.display = 'block';
  document.getElementById('leaderboard').style.display = 'block';
  document.getElementById('boost').style.display = 'block';
  document.getElementById('length').style.display = 'block';
}

function reviveAd() {
  adinplay.displayRewardedAd(() => {
    socket.emit('revive');
    document.getElementById('dead').style.display = 'none';
  });
}

function interstitialAd() {
  deathCount++;
  if (deathCount % 3 === 0) {
    adinplay.displayInterstitialAd(() => location.reload(), () => location.reload());
  } else {
    location.reload();
  }
}

socket.on('init', (id) => playerId = id);
socket.on('state', (g) => game = g);
socket.on('dead', (data) => {
  document.getElementById('finalScore').innerText = data.score;
  document.getElementById('dead').style.display = 'block';
});

function updateAngle(x, y) {
  const dx = x - window.innerWidth/2;
  const dy = y - window.innerHeight/2;
  mouseAngle = Math.atan2(dy, dx);
}

app.view.addEventListener('mousemove', (e) => updateAngle(e.clientX, e.clientY));
app.view.addEventListener('touchmove', (e) => { e.preventDefault(); updateAngle(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
app.view.addEventListener('touchstart', () => { boosting = true; socket.emit('boost', true); });
app.view.addEventListener('touchend', () => { boosting = false; socket.emit('boost', false); });
document.getElementById('boost').addEventListener('touchstart', () => { boosting = true; socket.emit('boost', true); });
document.getElementById('boost').addEventListener('touchend', () => { boosting = false; socket.emit('boost', false); });
window.addEventListener('keydown', (e) => { if(e.code==='Space') { boosting = true; socket.emit('boost', true); }});
window.addEventListener('keyup', (e) => { if(e.code==='Space') { boosting = false; socket.emit('boost', false); }});
setInterval(() => { if(playerId) socket.emit('move', mouseAngle); }, 33);

const minimap = document.getElementById('minimap').getContext('2d');
document.getElementById('minimap').width = 140;
document.getElementById('minimap').height = 140;

app.ticker.add(() => {
  // Garde le fond, supprime le reste
  while(world.children.length > 1) world.removeChildAt(1);

  // Orbes style Slither - petits ronds colorés
  game.orbs.forEach((orb, i) => {
    const g = new PIXI.Graphics();
    g.beginFill(0xffffff, 0.3);
    g.drawCircle(orb.x, orb.y, orb.size + 2);
    g.endFill();
    g.beginFill(parseInt(orb.color.replace('hsl','0x').replace(/[()%\s]/g,'')));
    g.drawCircle(orb.x, orb.y, orb.size);
    g.endFill();
    world.addChild(g);

    if (game.players[playerId] &&!game.players[playerId].dead) {
      const p = game.players[playerId];
      if (Math.hypot(p.x - orb.x, p.y - orb.y) < p.size + orb.size) {
        socket.emit('eatOrb', i);
      }
    }
  });

  // Joueurs style Slither
  const sorted = Object.values(game.players).sort((a,b) => b.score - a.score);
  sorted.forEach(p => {
    if (p.dead) return;
    const colors = SKINS[p.skin] || SKINS.green;
    const g = new PIXI.Graphics();

    // Corps - cercles qui se chevauchent
    for(let i = p.segments.length - 1; i >= 0; i--) {
      const seg = p.segments[i];
      const size = p.size * (1 - i / p.segments.length * 0.4);
      g.beginFill(colors[1]);
      g.drawCircle(seg.x, seg.y, size);
      g.endFill();
      g.beginFill(colors[0]);
      g.drawCircle(seg.x, seg.y, size * 0.8);
      g.endFill();
    }

    // Tête
    g.beginFill(colors[1]);
    g.drawCircle(p.x, p.y, p.size);
    g.endFill();
    g.beginFill(colors[0]);
    g.drawCircle(p.x, p.y, p.size * 0.8);
    g.endFill();

    // Yeux style Slither - gros yeux blancs
    const eyeDist = p.size * 0.5;
    const eyeSize = p.size * 0.35;
    g.beginFill(0xffffff);
    g.drawCircle(p.x + Math.cos(p.angle + 0.5)*eyeDist, p.y + Math.sin(p.angle + 0.5)*eyeDist, eyeSize);
    g.drawCircle(p.x + Math.cos(p.angle - 0.5)*eyeDist, p.y + Math.sin(p.angle - 0.5)*eyeDist, eyeSize);
    g.endFill();
    g.beginFill(0x000000);
    g.drawCircle(p.x + Math.cos(p.angle + 0.5)*eyeDist, p.y + Math.sin(p.angle + 0.5)*eyeDist, eyeSize*0.5);
    g.drawCircle(p.x + Math.cos(p.angle - 0.5)*eyeDist, p.y + Math.sin(p.angle - 0.5)*eyeDist, eyeSize*0.5);
    g.endFill();

    world.addChild(g);

    // Nom
    const text = new PIXI.Text(p.name, {fontSize: 12, fill: 0xffffff, stroke: 0x000000, strokeThickness: 3, fontWeight: 'bold'});
    text.x = p.x - text.width/2;
    text.y = p.y - p.size - 20;
    world.addChild(text);

    if (p.id === playerId) {
      // Caméra fluide
      world.x += (-p.x + window.innerWidth/2 - world.x) * 0.15;
      world.y += (-p.y + window.innerHeight/2 - world.y) * 0.15;
      document.getElementById('score').innerText = p.score;
      document.getElementById('len').innerText = Math.floor(p.size);
      document.getElementById('rank').innerText = sorted.indexOf(p) + 1;

      // Minimap ronde
      minimap.clearRect(0,0,140,140);
      minimap.fillStyle = 'rgba(0,0,0,0.3)';
      minimap.beginPath();
      minimap.arc(70,70,70,0,7);
      minimap.fill();
      Object.values(game.players).forEach(pl => {
        if (pl.dead) return;
        minimap.fillStyle = pl.id === playerId? '#00ff88' : '#ff4444';
        minimap.beginPath();
        minimap.arc(70 + (pl.x-2500)/5000*140, 70 + (pl.y-2500)/5000*140, pl.id === playerId? 3:2, 0, 7);
        minimap.fill();
      });
    }
  });

  // Leaderboard style Slither
  document.getElementById('leaders').innerHTML = sorted.filter(p=>!p.dead).slice(0,10).map((p,i) =>
    `<div style="color:${i<3?'#ff4444':'#aaa'}; font-size:12px; margin:2px 0;">#${i+1} ${p.name.substring(0,10)} - ${p.score}</div>`
  ).join('');
});
</script>
</body>
</html>
