<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Snake.io — Ultime</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --neon-cyan: #00f3ff;
    --neon-pink: #ff0055;
    --neon-green: #00ff66;
    --bg-dark: #05050b;
    --panel-bg: rgba(10, 10, 20, 0.82);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg-dark);
    font-family: 'Rajdhani', sans-serif;
    color: #fff;
    touch-action: none;
    user-select: none;
  }
  canvas { display: block; touch-action: none; }

  #menu {
    display: none;
    position: fixed; inset: 0;
    z-index: 50;
    background: radial-gradient(circle at 50% 30%, rgba(0,243,255,0.08), transparent 60%),
                linear-gradient(180deg, #05050b, #0a0a16);
  }
  .menu-wrap {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
    width: 100%;
    max-width: 380px;
    padding: 20px;
    text-align: center;
  }
  #menu h1 {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(28px, 8vw, 52px);
    letter-spacing: 3px;
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 30px rgba(0, 243, 255, 0.35);
    animation: pulseTitle 2.5s ease-in-out infinite;
  }
  @keyframes pulseTitle {
    0%, 100% { filter: drop-shadow(0 0 6px rgba(0,243,255,0.4)); }
    50% { filter: drop-shadow(0 0 18px rgba(255,0,85,0.5)); }
  }
  .menu-card {
    background: var(--panel-bg);
    border: 1px solid rgba(0, 243, 255, 0.25);
    border-radius: 16px;
    padding: 22px;
    width: min(340px, 88vw);
    backdrop-filter: blur(6px);
  }
  .field-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--neon-cyan);
    text-align: left;
    display: block;
    margin-bottom: 6px;
  }
  #name {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid rgba(0,243,255,0.35);
    background: rgba(0,0,0,0.4);
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 600;
    outline: none;
    margin-bottom: 18px;
  }
  #name:focus { border-color: var(--neon-cyan); box-shadow: 0 0 12px rgba(0,243,255,0.3); }
  #skinGrid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .skin-dot {
    aspect-ratio: 1;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
  }
  .skin-dot.selected {
    border-color: #fff;
    box-shadow: 0 0 14px currentColor;
    transform: scale(1.08);
  }
  .skin-dot[data-skin="cyan"]    { background: radial-gradient(circle at 35% 30%, #7cf9ff, #00f3ff); color: #00f3ff; }
  .skin-dot[data-skin="magenta"] { background: radial-gradient(circle at 35% 30%, #ff7fb0, #ff0055); color: #ff0055; }
  .skin-dot[data-skin="purple"]  { background: radial-gradient(circle at 35% 30%, #c993e6, #9d50bb); color: #9d50bb; }
  .skin-dot[data-skin="orange"]  { background: radial-gradient(circle at 35% 30%, #ffc37a, #ff8800); color: #ff8800; }
  .skin-dot[data-skin="green"]   { background: radial-gradient(circle at 35% 30%, #7dffb0, #00ff66); color: #00ff66; }

  #startBtn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 2px;
    color: #05050b;
    background: linear-gradient(90deg, var(--neon-cyan), #7cf9ff);
    box-shadow: 0 0 22px rgba(0,243,255,0.45);
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s;
  }
  #startBtn:active { transform: scale(0.97); }

  .hint { font-size: 12px; color: #5c6b8a; letter-spacing: 1px; margin-top: 8px; }

  /* HUD */
  #hud {
    display: none;
    position: fixed;
    top: max(14px, env(safe-area-inset-top));
    left: 14px;
    z-index: 20;
    background: var(--panel-bg);
    border: 1px solid rgba(0,243,255,0.25);
    border-radius: 12px;
    padding: 10px 16px;
    font-family: 'Orbitron', sans-serif;
    backdrop-filter: blur(6px);
  }
  #hud .stat-row { display: flex; align-items: baseline; gap: 8px; margin: 3px 0; }
  #hud .stat-label { font-size: 9px; letter-spacing: 1.5px; color: #7a8bb0; width: 56px; }
  #hud .stat-value { font-size: 15px; font-weight: 700; color: var(--neon-cyan); }
  #hud #rank { color: var(--neon-pink); }

  #length {
    display: none;
    position: fixed;
    top: max(14px, env(safe-area-inset-top));
    right: 14px;
    z-index: 20;
    background: var(--panel-bg);
    border: 1px solid rgba(0,255,102,0.25);
    border-radius: 12px;
    padding: 10px 16px;
    text-align: right;
    backdrop-filter: blur(6px);
  }
  #length .stat-label { font-size: 9px; letter-spacing: 1.5px; color: #7a8bb0; }
  #length .stat-value { font-size: 15px; font-weight: 700; color: var(--neon-green); }

  #leaderboard {
    display: none;
    position: fixed;
    top: max(100px, calc(env(safe-area-inset-top) + 90px));
    right: 14px;
    z-index: 20;
    width: 180px;
    background: var(--panel-bg);
    border: 1px solid rgba(255,0,85,0.25);
    border-radius: 12px;
    padding: 10px 12px;
    backdrop-filter: blur(6px);
  }
  #leaderboard .lb-title { font-family: 'Orbitron', sans-serif; font-size: 10px; letter-spacing: 2px; color: var(--neon-pink); margin-bottom: 6px; }
  #leaders { font-size: 12px; }

  #minimap {
    display: none;
    position: fixed;
    bottom: max(14px, env(safe-area-inset-bottom));
    right: 14px;
    z-index: 20;
    border-radius: 50%;
    border: 1px solid rgba(0,243,255,0.35);
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
  }

  #dead {
    display: none;
    position: fixed; inset: 0;
    z-index: 60;
    background: rgba(5,5,11,0.92);
    backdrop-filter: blur(4px);
  }
  .dead-wrap {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }
  #dead h2 { font-family: 'Orbitron', sans-serif; font-size: 30px; color: var(--neon-pink); text-shadow: 0 0 20px rgba(255,0,85,0.5); }
  #finalScore { font-size: 26px; color: var(--neon-cyan); font-weight: 700; }
  #respawnBtn {
    padding: 13px 34px;
    border: none;
    border-radius: 10px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 2px;
    color: #05050b;
    background: linear-gradient(90deg, var(--neon-cyan), #7cf9ff);
    box-shadow: 0 0 22px rgba(0,243,255,0.45);
    cursor: pointer;
  }
  #respawnBtn:active { transform: scale(0.97); }

  #boostVignette {
    display: none;
    position: fixed; inset: 0;
    z-index: 15;
    pointer-events: none;
    box-shadow: inset 0 0 120px rgba(255,0,85,0.35);
  }

  /* Joystick virtuel */
  #joystickZone {
    display: none;
    position: fixed;
    bottom: 30px;
    left: 30px;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.3);
    z-index: 25;
    touch-action: none;
  }
  #joystickKnob {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: rgba(0,243,255,0.6);
    transform: translate(-50%, -50%);
    pointer-events: none;
    box-shadow: 0 0 20px rgba(0,243,255,0.3);
  }
  @media (pointer: coarse) {
    #joystickZone { display: block; }
  }
</style>
</head>
<body>

<div id="menu">
  <div class="menu-wrap">
    <h1>SNAKE.IO</h1>
    <div class="menu-card">
      <label class="field-label">PSEUDO</label>
      <input id="name" type="text" maxlength="15" placeholder="Cyber_Anon" autocomplete="off">
      <label class="field-label">SKIN</label>
      <div id="skinGrid">
        <div class="skin-dot selected" data-skin="cyan"></div>
        <div class="skin-dot" data-skin="magenta"></div>
        <div class="skin-dot" data-skin="purple"></div>
        <div class="skin-dot" data-skin="orange"></div>
        <div class="skin-dot" data-skin="green"></div>
      </div>
      <input type="hidden" id="skin" value="cyan">
      <button id="startBtn">JOUER</button>
      <div class="hint">Souris / clavier / tactile · Espace ou double‑doigt pour booster</div>
    </div>
  </div>
</div>

<div id="hud">
  <div class="stat-row"><span class="stat-label">SCORE</span><span class="stat-value" id="score">0</span></div>
  <div class="stat-row"><span class="stat-label">RANG</span><span class="stat-value" id="rank">-</span><span class="stat-value" style="color:#7a8bb0;font-size:12px;">/ <span id="total">0</span></span></div>
  <div class="stat-row"><span class="stat-label">VITESSE</span><span class="stat-value" id="speed" style="color:#ffaa00;">0</span></div>
</div>

<div id="length">
  <div class="stat-label">TAILLE</div>
  <div class="stat-value" id="len">0</div>
</div>

<div id="leaderboard">
  <div class="lb-title">TOP JOUEURS</div>
  <div id="leaders"></div>
</div>

<canvas id="minimap"></canvas>
<div id="boostVignette"></div>

<div id="dead">
  <div class="dead-wrap">
    <h2>💀 ÉLIMINÉ</h2>
    <div class="score-box">SCORE FINAL</div>
    <div id="finalScore">0</div>
    <button id="respawnBtn">REJOUER</button>
  </div>
</div>

<!-- Joystick -->
<div id="joystickZone">
  <div id="joystickKnob"></div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.4.2/pixi.min.js"></script>

<script>
  // Sélection des skins
  document.querySelectorAll('.skin-dot').forEach(dot => {
    dot.addEventListener('click', () => {
      document.querySelectorAll('.skin-dot').forEach(d => d.classList.remove('selected'));
      dot.classList.add('selected');
      document.getElementById('skin').value = dot.dataset.skin;
    });
  });
</script>
<script src="game.js"></script>
</body>
</html>
