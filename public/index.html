<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Cyber Slither Elite</title>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@7.3.2/dist/pixi.min.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
  * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; box-sizing: border-box; }
  body { margin:0; overflow:hidden; background:#05050b; font-family:'Segoe UI', Arial, sans-serif; touch-action:none; position:fixed; width:100%; height:100%; }
  #menu { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(8, 8, 16, 0.95); padding:35px; border-radius:20px; text-align:center; width:85%; max-width:350px; box-shadow:0 0 40px rgba(0, 255, 204, 0.25); border: 1px solid rgba(0, 255, 204, 0.4); z-index: 100; backdrop-filter: blur(10px); }
  #menu h1 { color:#fff; font-size:42px; margin:0 0 25px 0; font-weight:900; text-shadow: 0 0 15px #00ffcc; letter-spacing: 3px; }
  input, select { padding:14px; border-radius:10px; border:1px solid #222; margin:10px 0; background:#0f0f1f; color:#fff; font-size:16px; width:100%; text-align:center; outline: none; transition: 0.2s; }
  input:focus { border-color: #00ffcc; box-shadow: 0 0 12px rgba(0,255,204,0.4); }
  button { padding:16px 0; background:linear-gradient(135deg, #00ffcc, #0077ff); border:none; border-radius:10px; font-weight:bold; cursor:pointer; font-size:18px; color:#000; width:100%; margin-top:20px; box-shadow: 0 4px 15px rgba(0,255,204,0.3); transition: 0.2s; }
  button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,255,204,0.5); }
  #hud { position:absolute; top:20px; left:20px; color:#fff; font-size:18px; display:none; z-index:10; background:rgba(8,8,16,0.75); padding:10px 20px; border-radius:10px; border-left: 4px solid #00ffcc; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
  #minimap { position:absolute; bottom:25px; right:25px; width:130px; height:130px; background:rgba(5,5,10,0.7); border:2px solid rgba(0, 255, 204, 0.4); border-radius:50%; display:none; z-index:10; box-shadow: 0 0 15px rgba(0,255,204,0.1); }
  #dead { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(20, 8, 12, 0.98); padding:35px; border-radius:20px; text-align:center; display:none; width:85%; max-width:350px; z-index:120; border: 2px solid #ff0055; box-shadow: 0 0 40px rgba(255,0,85,0.4); backdrop-filter: blur(10px); }
  #leaderboard { position:absolute; top:20px; right:20px; background:rgba(8,8,16,0.75); padding:15px 20px; border-radius:10px; color:#fff; display:none; font-size:12px; z-index:10; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
  #leaderboard b { color:#00ffcc; font-size:14px; display:block; margin-bottom:8px; text-transform: uppercase; letter-spacing: 1px; }
  #length { position:absolute; bottom:25px; left:25px; color:#fff; font-size:14px; display:none; z-index:10; background:rgba(8,8,16,0.75); padding:10px 15px; border-radius:10px; font-family: monospace; }
</style>
</head>
<body>
<div id="menu">
  <h1>CYBER ELITE</h1>
  <input id="name" placeholder="VOTRE NOM" value="Elite_Player" maxlength="15">
  <select id="skin">
    <option value="cyan">Hyper Cyan</option>
    <option value="magenta">Pulse Magenta</option>
    <option value="purple">Overdrive Purple</option>
    <option value="orange">Solar Gold</option>
    <option value="green">Toxic Green</option>
  </select>
  <button onclick="start()">DOMINER L'ARÈNE</button>
</div>
<div id="hud">SCORE: <span id="score">0</span></div>
<canvas id="minimap"></canvas>
<div id="leaderboard"><b>Top 7 Arena</b><div id="leaders"></div></div>
<div id="length">SIZE: <span id="len">0</span><br>RANK: <span id="rank">1</span> / <span id="total">1</span></div>
<div id="dead">
  <h2 style="color:#ff0055; font-size:32px; margin:0; font-weight:900; text-shadow: 0 0 15px #ff0055;">SYSTEM OVERRIDE</h2>
  <p style="color:#889; font-size:16px; margin:20px 0;">Tu as fini avec une taille de: <b style="color:#fff; font-size:20px;" id="finalScore">0</b></p>
  <button onclick="location.reload()" style="background:linear-gradient(135deg, #ff0055, #ff5500); color:#fff; width:100%;">RECHARGER LE NOYAU</button>
</div>

<script>
const app = new PIXI.Application({ resizeTo: window, antialias: true, backgroundColor: 0x05050b });
document.body.prepend(app.view);
const socket = io();
let playerId = null, game = {players:{}, orbs:[]}, mouseAngle = 0, isBoosting = false;
let targetZoom = 1, currentZoom = 1;
let particles = []; // Effets d'explosions locaux dynamiques

const world = new PIXI.Container();
app.stage.addChild(world);

const SKINS = {
  cyan: { body: 0x00f3ff, glow: 0x0055ff },
  magenta: { body: 0xff0055, glow: 0xff00aa },
  purple: { body: 0x9d50bb, glow: 0x3a1c71 },
  orange: { body: 0xff8800, glow: 0xff3300 },
  green: { body: 0x00ff66, glow: 0x009933 }
};

// Grille Radiale Technologique
const gridBg = new PIXI.Graphics();
gridBg.lineStyle(1.5, 0x00ffcc, 0.07);
for (let x = 0; x <= 5000; x += 120) { gridBg.moveTo(x, 0); gridBg.lineTo(x, 5000); }
for (let y = 0; y <= 5000; y += 120) { gridBg.moveTo(0, y); gridBg.lineTo(5000, y); }
gridBg.lineStyle(8, 0xff0055, 0.6); gridBg.drawRect(0, 0, 5000, 5000);
world.addChild(gridBg);

const gameGraphics = new PIXI.Graphics();
world.addChild(gameGraphics);
const textContainer = new PIXI.Container();
world.addChild(textContainer);

function start() {
  socket.emit('join', { name: document.getElementById('name').value, skin: document.getElementById('skin').value });
  document.getElementById('menu').style.display = 'none';
  document.getElementById('hud').style.display = 'block';
  document.getElementById('minimap').style.display = 'block';
  document.getElementById('leaderboard').style.display = 'block';
  document.getElementById('length').style.display = 'block';
}

socket.on('init', (id) => playerId = id);
socket.on('state', (g) => {
  // Détection locale des morts pour déclencher l'effet visuel de destruction
  Object.keys(game.players).forEach(id => {
    if (g.players[id] && game.players[id] && !game.players[id].dead && g.players[id].dead) {
      triggerExplosion(g.players[id].x, g.players[id].y, game.players[id].color);
    }
  });
  game = g;
});
socket.on('dead', (data) => {
  document.getElementById('finalScore').innerText = Math.floor(data.score);
  document.getElementById('dead').style.display = 'block';
});

// GESTION EXPLOSIONS PARTICULES
function triggerExplosion(x, y, color) {
  const pColor = parseInt(color);
  for(let i=0; i<35; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 16,
      vy: (Math.random() - 0.5) * 16,
      alpha: 1,
      size: 3 + Math.random() * 5,
      color: pColor
    });
  }
}

// CONTRÔLES PC (CLAVIER CONFIGURÉ FLUIDE)
let keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
window.addEventListener('keydown', (e) => { 
  if(e.code === 'Space') { socket.emit('boost', true); isBoosting = true; }
  if(e.key in keys) keys[e.key] = true;
  calculateKeyAngle();
});
window.addEventListener('keyup', (e) => { 
  if(e.code === 'Space') { socket.emit('boost', false); isBoosting = false; }
  if(e.key in keys) keys[e.key] = false;
  calculateKeyAngle();
});

function calculateKeyAngle() {
  let x = 0, y = 0;
  if (keys.w || keys.ArrowUp) y -= 1;
  if (keys.s || keys.ArrowDown) y += 1;
  if (keys.a || keys.ArrowLeft) x -= 1;
  if (keys.d || keys.ArrowRight) x += 1;
  if (x !== 0 || y !== 0) {
    mouseAngle = Math.atan2(y, x);
    socket.emit('move', mouseAngle);
  }
}

// CONTRÔLES SMARTPHONE SANS COUTURE
let touchStart = { x: 0, y: 0 };
window.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    touchStart.x = e.touches[0].clientX;
    touchStart.y = e.touches[0].clientY;
  } else {
    socket.emit('boost', true); isBoosting = true;
  }
});
window.addEventListener('touchmove', (e) => {
  if (e.touches.length === 1) {
    const dx = e.touches[0].clientX - touchStart.x;
    const dy = e.touches[0].clientY - touchStart.y;
    if (Math.hypot(dx, dy) > 8) {
      mouseAngle = Math.atan2(dy, dx);
      socket.emit('move', mouseAngle);
    }
  }
});
window.addEventListener('touchend', (e) => {
  if (e.touches.length < 2) { socket.emit('boost', false); isBoosting = false; }
});
window.addEventListener('mousemove', (e) => {
  if(!keys.w && !keys.a && !keys.s && !keys.d && !keys.ArrowUp) {
    mouseAngle = Math.atan2(e.clientY - window.innerHeight/2, e.clientX - window.innerWidth/2);
    socket.emit('move', mouseAngle);
  }
});

setInterval(() => { if(playerId) socket.emit('move', mouseAngle); }, 30);

const minimap = document.getElementById('minimap').getContext('2d');
document.getElementById('minimap').width = 130;
document.getElementById('minimap').height = 130;

// MACHINE DE RENDU PRINCIPALE
app.ticker.add(() => {
  gameGraphics.clear();
  textContainer.removeChildren();

  // 1. CALCUL DE L'EFFET CYBER ZOOM PARTICULIER
  targetZoom = isBoosting ? 0.88 : 1.05;
  currentZoom += (targetZoom - currentZoom) * 0.08;
  world.scale.set(currentZoom);

  // 2. RENDU PARTICULES LOCALES (EXPLOSIONS)
  gameGraphics.blendMode = PIXI.BLEND_MODES.ADD;
  particles.forEach((p, idx) => {
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.94; p.vy *= 0.94; // Friction
    p.alpha -= 0.025;
    if(p.alpha <= 0) { particles.splice(idx, 1); return; }
    gameGraphics.beginFill(p.color, p.alpha);
    gameGraphics.drawCircle(p.x, p.y, p.size);
    gameGraphics.endFill();
  });

  // 3. RENDU DES ORBES ÉNERGÉTIQUES
  game.orbs.forEach((orb) => {
    const color = parseInt(orb.color);
    // Halo Extérieur Pulsé
    const pulse = 1 + Math.sin(Date.now() * 0.008) * 0.12;
    gameGraphics.beginFill(color, 0.15); 
    gameGraphics.drawCircle(orb.x, orb.y, orb.size * 4 * pulse); 
    gameGraphics.endFill();
    
    // Noyau de matière
    gameGraphics.beginFill(color, 0.95); 
    gameGraphics.drawCircle(orb.x, orb.y, orb.size); 
    gameGraphics.endFill();
    
    // Éclat Central Blanc
    gameGraphics.beginFill(0xFFFFFF, 0.9); 
    gameGraphics.drawCircle(orb.x - orb.size*0.18, orb.y - orb.size*0.18, orb.size * 0.35); 
    gameGraphics.endFill();
  });
  gameGraphics.blendMode = PIXI.BLEND_MODES.NORMAL;

  const sorted = Object.values(game.players).sort((a,b) => b.score - a.score);
  
  sorted.forEach(p => {
    if (p.dead) return;
    const colors = SKINS[p.skin] || SKINS.cyan;

    // Traînée de particules de boost en temps réel
    if (p.boostActive && Math.random() < 0.4) {
      gameGraphics.blendMode = PIXI.BLEND_MODES.ADD;
      gameGraphics.beginFill(colors.body, 0.4);
      gameGraphics.drawCircle(p.x + (Math.random()-0.5)*15, p.y + (Math.random()-0.5)*15, p.size * 0.6);
      gameGraphics.endFill();
      gameGraphics.blendMode = PIXI.BLEND_MODES.NORMAL;
    }

    // CORPS CYBER DYNAMIQUE
    for(let i = p.segments.length - 1; i >= 0; i--) {
      const seg = p.segments[i];
      const size = p.size * (1 - (i / Math.max(1, p.segments.length)) * 0.22);
      
      gameGraphics.beginFill(colors.glow, 0.2); 
      gameGraphics.drawCircle(seg.x, seg.y, size * 1.35); 
      gameGraphics.endFill();
      
      gameGraphics.beginFill(colors.body); 
      gameGraphics.drawCircle(seg.x, seg.y, size); 
      gameGraphics.endFill();
    }

    // TÊTE DU SERPENT
    gameGraphics.beginFill(colors.glow, 0.35); 
    gameGraphics.drawCircle(p.x, p.y, p.size * 1.4); 
    gameGraphics.endFill();
    
    gameGraphics.beginFill(colors.body); 
    gameGraphics.drawCircle(p.x, p.y, p.size); 
    gameGraphics.endFill();

    // YEUX INVERSÉS NUMÉRIQUES
    const eye1 = p.angle + 0.48; const eye2 = p.angle - 0.48;
    const ed = p.size * 0.52; const es = p.size * 0.36;
    gameGraphics.beginFill(0xFFFFFF);
    gameGraphics.drawCircle(p.x + Math.cos(eye1)*ed, p.y + Math.sin(eye1)*ed, es);
    gameGraphics.drawCircle(p.x + Math.cos(eye2)*ed, p.y + Math.sin(eye2)*ed, es);
    gameGraphics.endFill();

    gameGraphics.beginFill(colors.glow);
    gameGraphics.drawCircle(p.x + Math.cos(eye1)*(ed+1), p.y + Math.sin(eye1)*(ed+1), es*0.4);
    gameGraphics.drawCircle(p.x + Math.cos(eye2)*(ed+1), p.y + Math.sin(eye2)*(ed+1), es*0.4);
    gameGraphics.endFill();

    if(p.name) {
      const text = new PIXI.Text(p.name, {fontSize: 13, fill: 0xffffff, stroke: 0x010103, strokeThickness: 3.5, fontFamily: 'Arial', fontWeight: 'bold'});
      text.x = p.x - text.width/2; text.y = p.y - p.size - 22;
      textContainer.addChild(text);
    }

    // CAMÉRA SPRING-LERP ULTRA-FLUIDE
    if (p.id === playerId) {
      const targetCamX = -p.x * currentZoom + window.innerWidth / 2;
      const targetCamY = -p.y * currentZoom + window.innerHeight / 2;
      world.x += (targetCamX - world.x) * 0.18;
      world.y += (targetCamY - world.y) * 0.18;
      
      document.getElementById('score').innerText = Math.floor(p.score);
      document.getElementById('len').innerText = Math.floor(p.size);
      document.getElementById('rank').innerText = sorted.filter(pl=>!pl.dead).indexOf(p) + 1;
      document.getElementById('total').innerText = sorted.filter(pl=>!pl.dead).length;

      // MINIMAP NÉON
      minimap.clearRect(0,0,130,130);
      minimap.fillStyle = 'rgba(8,8,16,0.7)';
      minimap.beginPath(); minimap.arc(65,65,65,0,7); minimap.fill();
      Object.values(game.players).forEach(pl => {
        if (pl.dead) return;
        minimap.fillStyle = pl.id === playerId ? '#00ffcc' : '#ff0055';
        minimap.beginPath(); minimap.arc(65 + (pl.x-2500)/5000*115, 65 + (pl.y-2500)/5000*115, pl.id === playerId ? 4.5 : 2.5, 0, 7); minimap.fill();
      });
    }
  });

  // METTRE À JOUR LE DASHBOARD
  document.getElementById('leaders').innerHTML = sorted.filter(p=>!p.dead).slice(0,7).map((p,i) =>
    `<div style="color:${i===0?'#00ffcc':i===1?'#ff0055':'#b2b2cc'}; margin:4px 0; font-family: monospace; font-size:12px;">#${i+1} ${p.name.substring(0,9).padEnd(10,'_')} [${Math.floor(p.score)}]</div>`
  ).join('');
});
</script>
</body>
</html>
