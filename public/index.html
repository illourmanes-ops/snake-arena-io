<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Snake.io</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #05050b; overflow: hidden; font-family: Arial, sans-serif; touch-action: none; }
    canvas { display: block; }

    #menu {
      position: fixed; inset: 0; z-index: 50;
      display: none;
      background: rgba(5,5,11,0.95);
      justify-content: center; align-items: center;
      flex-direction: column;
    }
    .menu-box {
      background: #111;
      padding: 30px;
      border-radius: 16px;
      border: 1px solid #00f3ff;
      text-align: center;
      max-width: 360px;
      width: 90%;
    }
    .menu-box h1 { color: #00f3ff; font-size: 32px; margin-bottom: 20px; }
    input, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      border-radius: 8px;
      font-size: 16px;
    }
    input { background: #222; color: #fff; }
    button { background: #00f3ff; color: #000; font-weight: bold; cursor: pointer; }
    .skin-grid { display: flex; gap: 10px; justify-content: center; margin: 12px 0; }
    .skin-dot {
      width: 40px; height: 40px; border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
    }
    .skin-dot.selected { border-color: #fff; }
    .skin-dot[data-skin="cyan"] { background: #00f3ff; }
    .skin-dot[data-skin="magenta"] { background: #ff0055; }
    .skin-dot[data-skin="purple"] { background: #9d50bb; }
    .skin-dot[data-skin="orange"] { background: #ff8800; }
    .skin-dot[data-skin="green"] { background: #00ff66; }

    #hud {
      position: fixed; top: 10px; left: 10px; z-index: 10;
      color: #fff; font-size: 14px;
      background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px;
      display: none;
    }
    #length {
      position: fixed; top: 10px; right: 10px; z-index: 10;
      color: #fff; font-size: 14px;
      background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px;
      display: none;
    }
    #leaderboard {
      position: fixed; top: 80px; right: 10px; z-index: 10;
      color: #fff; font-size: 12px;
      background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px;
      display: none;
      max-height: 60vh; overflow-y: auto;
    }
    #leaderboard .title { color: #ff0055; font-weight: bold; margin-bottom: 5px; }
    #minimap {
      position: fixed; bottom: 20px; right: 20px; z-index: 10;
      border-radius: 50%; border: 1px solid #00f3ff;
      display: none;
    }
    #dead {
      position: fixed; inset: 0; z-index: 60;
      background: rgba(0,0,0,0.9);
      display: none;
      justify-content: center; align-items: center;
      flex-direction: column;
    }
    #dead h2 { color: #ff0055; font-size: 36px; }
    #dead .score { color: #fff; font-size: 24px; margin: 10px 0; }
    #dead button { padding: 12px 30px; background: #00f3ff; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }

    /* Joystick (mobile) */
    #joystick {
      position: fixed; bottom: 40px; left: 40px; z-index: 20;
      width: 120px; height: 120px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.3);
      display: none;
      touch-action: none;
    }
    #joystick-knob {
      position: absolute;
      top: 50%; left: 50%;
      width: 50px; height: 50px;
      border-radius: 50%;
      background: rgba(0,243,255,0.6);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    @media (pointer: coarse) {
      #joystick { display: block; }
    }
  </style>
</head>
<body>

<div id="menu">
  <div class="menu-box">
    <h1>🐍 SNAKE.IO</h1>
    <input id="name" type="text" placeholder="Pseudo" maxlength="12" value="Joueur">
    <div class="skin-grid">
      <div class="skin-dot selected" data-skin="cyan"></div>
      <div class="skin-dot" data-skin="magenta"></div>
      <div class="skin-dot" data-skin="purple"></div>
      <div class="skin-dot" data-skin="orange"></div>
      <div class="skin-dot" data-skin="green"></div>
    </div>
    <input type="hidden" id="skin" value="cyan">
    <button id="startBtn">JOUER</button>
  </div>
</div>

<div id="hud">
  <div>Score: <span id="score">0</span></div>
  <div>Rang: <span id="rank">-</span> / <span id="total">0</span></div>
  <div>Vitesse: <span id="speed">0</span></div>
</div>

<div id="length">
  Taille: <span id="len">0</span>
</div>

<div id="leaderboard">
  <div class="title">🏆 TOP</div>
  <div id="leaders"></div>
</div>

<canvas id="minimap" width="130" height="130"></canvas>

<div id="dead">
  <h2>💀 ÉLIMINÉ</h2>
  <div class="score">Score: <span id="finalScore">0</span></div>
  <button id="respawnBtn">REJOUER</button>
</div>

<div id="joystick"><div id="joystick-knob"></div></div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.4.2/pixi.min.js"></script>
<script>
  // Gestion des skins
  document.querySelectorAll('.skin-dot').forEach(dot => {
    dot.addEventListener('click', () => {
      document.querySelectorAll('.skin-dot').forEach(d => d.classList.remove('selected'));
      dot.classList.add('selected');
      document.getElementById('skin').value = dot.dataset.skin;
    });
  });
</script>
<script src="game.js"></script>
</body>
</html>
