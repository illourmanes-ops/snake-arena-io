<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Arena.IO</title>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@7.3.2/dist/pixi.min.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
  body { margin:0; overflow:hidden; background:#0a0015; font-family:Arial; }
  #menu { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:#1a0033; padding:30px; border-radius:20px; border:2px solid #2DD4BF; text-align:center; }
  input { padding:12px; border-radius:10px; border:2px solid #2DD4BF; margin:10px; background:#0a0015; color:#fff; }
  button { padding:15px 40px; background:#2DD4BF; border:none; border-radius:10px; font-weight:bold; cursor:pointer; }
  #hud { position:absolute; top:15px; left:15px; color:#fff; font-size:24px; font-weight:bold; display:none; }
</style>
</head>
<body>
<div id="menu">
  <h1 style="color:#2DD4BF;">🐍 Snake Arena.IO</h1>
  <input id="name" placeholder="Pseudo" value="Player">
  <br><button onclick="start()">JOUER</button>
</div>
<div id="hud">Score: <span id="score">0</span></div>

<script>
const app = new PIXI.Application({ resizeTo: window, backgroundColor: 0x0a0015 });
document.body.prepend(app.view);
const socket = io();
let playerId = null, game = {players:{}, orbs:[]}, mouseAngle = 0;
const world = new PIXI.Container();
app.stage.addChild(world);

// Grille
const grid = new PIXI.Graphics();
for(let i = 0; i < 5000; i += 50) {
  grid.lineStyle(1, 0x1a0033, 0.3);
  grid.moveTo(i, 0).lineTo(i, 5000);
  grid.moveTo(0, i).lineTo(5000, i);
}

function start() {
  socket.emit('join', { name: document.getElementById('name').value });
  document.getElementById('menu').style.display = 'none';
  document.getElementById('hud').style.display = 'block';
}

socket.on('init', (id) => playerId = id);
socket.on('state', (g) => game = g);

app.view.onmousemove = (e) => {
  const dx = e.clientX - window.innerWidth/2;
  const dy = e.clientY - window.innerHeight/2;
  mouseAngle = Math.atan2(dy, dx);
};
app.view.ontouchmove = (e) => {
  const t = e.touches[0];
  const dx = t.clientX - window.innerWidth/2;
  const dy = t.clientY - window.innerHeight/2;
  mouseAngle = Math.atan2(dy, dx);
};
setInterval(() => { if(playerId) socket.emit('move', mouseAngle); }, 50);

app.ticker.add(() => {
  world.removeChildren();
  world.addChild(grid);

  // Orbes
  game.orbs.forEach((orb, i) => {
    const g = new PIXI.Graphics();
    g.beginFill(0x2DD4BF);
    g.drawCircle(orb.x, orb.y, orb.size);
    g.endFill();
    world.addChild(g);

    if (game.players[playerId]) {
      const p = game.players[playerId];
      if (Math.hypot(p.x - orb.x, p.y - orb.y) < p.size + orb.size) {
        socket.emit('eatOrb', i);
      }
    }
  });

  // Joueurs
  for (let id in game.players) {
    const p = game.players[id];
    const g = new PIXI.Graphics();
    g.beginFill(0x00FFFF);
    g.drawCircle(p.x, p.y, p.size);
    g.endFill();
    if (p.segments.length > 1) {
      g.lineStyle(p.size * 0.6, 0x00FFFF);
      g.moveTo(p.x, p.y);
      p.segments.forEach(s => g.lineTo(s.x, s.y));
    }
    world.addChild(g);

    if (id === playerId) {
      world.x = -p.x + window.innerWidth/2;
      world.y = -p.y + window.innerHeight/2;
      document.getElementById('score').innerText = p.score;
    }
  }
});
</script>
</body>
</html>
